<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinking Engine</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .thread-node { cursor: pointer; }
    .thread-node:hover circle:first-child { opacity: 0.3 !important; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse-dot 2s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = '';

function useAPI(path, interval = 2000) {
  const [data, setData] = useState(null);
  useEffect(() => {
    const f = () => fetch(API + path).then(r => r.json()).then(setData).catch(() => {});
    f();
    const id = setInterval(f, interval);
    return () => clearInterval(id);
  }, [path, interval]);
  return data;
}

function useSSE() {
  const [events, setEvents] = useState([]);
  useEffect(() => {
    const es = new EventSource(API + '/events');
    es.onmessage = (e) => {
      const ev = JSON.parse(e.data);
      setEvents(prev => [...prev.slice(-500), { ...ev, _time: new Date() }]);
    };
    return () => es.close();
  }, []);
  return events;
}

const RATE_COLORS = {
  reactive: '#34d399', fast: '#60a5fa', normal: '#fbbf24',
  slow: '#f97316', sleep: '#6b7280'
};
const rateColor = (r) => RATE_COLORS[r] || '#94a3b8';

function StatusBar({ status }) {
  if (!status) return <div className="p-4 text-slate-500">Connecting...</div>;
  return (
    <div className="flex items-center gap-4 px-4 py-3 border-b border-slate-700">
      <div className="flex items-center gap-2">
        <div className="w-2 h-2 rounded-full bg-emerald-400 pulse" />
        <span className="text-emerald-400 font-bold text-sm">ONLINE</span>
      </div>
      <span className="text-slate-400 text-xs">#{status.iteration}</span>
      <span className="text-slate-400 text-xs">{status.rate}/{status.model}</span>
      <span className="text-slate-400 text-xs">{status.threads} threads</span>
      <span className="text-slate-400 text-xs">{status.memories} mem</span>
      <span className="text-slate-400 text-xs">{Math.floor(status.uptime_seconds/60)}m</span>
    </div>
  );
}

function ThreadGraph({ threads, status, activeThread, onSelect }) {
  const subs = threads ? threads.filter(t => t.id !== 'main') : [];
  const mainThread = threads ? threads.find(t => t.id === 'main') : null;
  const count = subs.length;
  const w = 600, h = count > 0 ? 220 : 100;
  const cx = w / 2, cy = h / 2;

  const nodes = [{
    id: 'main',
    x: cx, y: cy,
    rate: mainThread ? mainThread.rate : (status ? status.rate : 'normal'),
    model: mainThread ? mainThread.model : (status ? status.model : 'large'),
    iteration: mainThread ? mainThread.iteration : (status ? status.iteration : 0),
  }];
  const lines = [];

  if (count > 0) {
    const angleStep = (2 * Math.PI) / count;
    subs.forEach((t, i) => {
      const angle = angleStep * i - Math.PI / 2;
      const r = 80;
      nodes.push({ ...t, x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
      lines.push({ x1: cx, y1: cy, x2: cx + Math.cos(angle) * r, y2: cy + Math.sin(angle) * r });
    });
  }

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{maxHeight: '220px'}}>
      {lines.map((l, i) => (
        <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#334155" strokeWidth="1.5" strokeDasharray="4,3" />
      ))}
      {nodes.map(n => {
        const isMain = n.id === 'main';
        const isActive = n.id === activeThread;
        const color = rateColor(n.rate);
        const size = isMain ? 28 : 20;
        const ring = isActive ? '#e2e8f0' : color;
        return (
          <g key={n.id} className="thread-node" onClick={() => onSelect(n.id)}>
            <circle cx={n.x} cy={n.y} r={size + (isActive ? 4 : 0)} fill="none" stroke={ring} strokeWidth={isActive ? 2 : 0} strokeDasharray={isActive ? '' : '0'} />
            <circle cx={n.x} cy={n.y} r={size} fill={color} opacity="0.15" stroke={color} strokeWidth="1.5" />
            <circle cx={n.x} cy={n.y} r={3} fill={color} className={n.rate === 'reactive' || n.rate === 'fast' ? 'pulse' : ''} />
            <text x={n.x} y={n.y + size + 12} textAnchor="middle" fill="#cbd5e1" fontSize="10" fontWeight={isActive ? 'bold' : 'normal'}>{n.id}</text>
            <text x={n.x} y={n.y + size + 23} textAnchor="middle" fill="#64748b" fontSize="8">
              {n.rate}/{n.model} #{n.iteration}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function ThoughtsPanel({ events, activeThread }) {
  const ref = useRef(null);
  const thoughts = events.filter(e => e.type === 'thought' && e.thread_id === activeThread);

  useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [thoughts.length]);

  return (
    <div ref={ref} className="overflow-y-auto h-full p-3 text-sm font-mono space-y-3">
      {thoughts.length === 0 && <div className="text-slate-600">No thoughts yet for "{activeThread}"</div>}
      {thoughts.map((t, i) => (
        <div key={i} className="border-l-2 border-slate-700 pl-3">
          <div className="flex items-center gap-2 text-xs mb-1">
            <span className="text-sky-400 font-bold">#{t.iteration}</span>
            <span className="text-slate-500">{t.duration}</span>
            <span className="text-slate-600">{t._time ? t._time.toLocaleTimeString() : ''}</span>
          </div>
          <div className="text-slate-300 whitespace-pre-wrap text-xs leading-relaxed">{t.message}</div>
        </div>
      ))}
    </div>
  );
}

function EventLog({ events }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [events.length]);

  const typeColor = (type) => {
    switch(type) {
      case 'thought': return 'text-sky-400';
      case 'reply': return 'text-emerald-400';
      case 'thread_started': return 'text-blue-400';
      case 'thread_done': return 'text-orange-400';
      case 'error': return 'text-red-400';
      default: return 'text-slate-400';
    }
  };

  return (
    <div ref={ref} className="overflow-y-auto h-full space-y-0.5 p-3 text-xs font-mono">
      {events.length === 0 && <div className="text-slate-600">Waiting for events...</div>}
      {events.map((ev, i) => (
        <div key={i} className="flex gap-2 leading-tight">
          <span className="text-slate-600 shrink-0">{ev._time ? ev._time.toLocaleTimeString() : ''}</span>
          <span className={`shrink-0 ${typeColor(ev.type)}`}>[{ev.type}]</span>
          <span className="text-slate-500 shrink-0">{ev.thread_id}</span>
          <span className="text-slate-300 truncate">{ev.message && ev.message.substring(0, 120)}</span>
        </div>
      ))}
    </div>
  );
}

function Console() {
  const [cmd, setCmd] = useState('');
  const [history, setHistory] = useState([]);
  const send = useCallback(() => {
    if (!cmd.trim()) return;
    fetch(API + '/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: cmd }) });
    setHistory(prev => [...prev, cmd]);
    setCmd('');
  }, [cmd]);

  return (
    <div className="flex flex-col h-full">
      <div className="flex-1 overflow-y-auto p-3 space-y-1 text-xs font-mono">
        {history.map((h, i) => <div key={i} className="text-amber-400">&gt; {h}</div>)}
      </div>
      <div className="border-t border-slate-700 p-2 flex gap-2">
        <span className="text-amber-400 text-sm">&gt;</span>
        <input value={cmd} onChange={e => setCmd(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()}
          className="flex-1 bg-transparent text-sm text-slate-200 outline-none placeholder-slate-600" placeholder="command..." />
        <button onClick={send} className="text-xs text-slate-400 hover:text-white px-2 py-1 rounded bg-slate-800 hover:bg-slate-700">Send</button>
      </div>
    </div>
  );
}

function DirectiveEditor() {
  const config = useAPI('/config', 5000);
  const [text, setText] = useState('');
  const [saved, setSaved] = useState(false);
  const loaded = useRef(false);
  useEffect(() => { if (config && !loaded.current) { setText(config.directive); loaded.current = true; } }, [config]);
  const save = () => {
    fetch(API + '/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ directive: text }) })
      .then(() => { setSaved(true); setTimeout(() => setSaved(false), 2000); });
  };
  return (
    <div className="flex flex-col h-full p-3 gap-2">
      <div className="flex items-center justify-between">
        <span className="text-yellow-400 text-sm font-bold">Directive</span>
        <button onClick={save} className={`text-xs px-3 py-1 rounded ${saved ? 'bg-emerald-800 text-emerald-300' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}>
          {saved ? 'Saved!' : 'Save'}
        </button>
      </div>
      <textarea value={text} onChange={e => setText(e.target.value)}
        className="flex-1 bg-slate-900 border border-slate-700 rounded p-3 text-sm text-slate-200 outline-none resize-none focus:border-yellow-500"
        placeholder="Enter system directive..." />
    </div>
  );
}

function ThreadList({ threads, activeThread, onSelect }) {
  if (!threads || threads.length === 0) return <div className="p-3 text-slate-600 text-sm">No threads</div>;
  return (
    <div className="space-y-2 p-3 overflow-y-auto">
      {threads.map(t => (
        <div key={t.id} onClick={() => onSelect(t.id)}
          className={`rounded p-3 border cursor-pointer transition-colors ${t.id === activeThread ? 'bg-slate-700 border-indigo-500' : 'bg-slate-800 border-slate-700 hover:border-slate-500'}`}>
          <div className="flex items-center justify-between">
            <span className="text-indigo-400 font-bold text-sm">{t.id}</span>
            <span className="text-xs text-slate-500">{t.age}</span>
          </div>
          <div className="flex gap-3 mt-1 text-xs text-slate-400">
            <span style={{color: rateColor(t.rate)}}>{t.rate}/{t.model}</span>
            <span>#{t.iteration}</span>
          </div>
          {t.tools && t.tools.length > 0 && <div className="mt-1 text-xs text-slate-600">{t.tools.join(', ')}</div>}
        </div>
      ))}
    </div>
  );
}

function App() {
  const status = useAPI('/status', 1000);
  const threads = useAPI('/threads', 2000);
  const events = useSSE();
  const [sideTab, setSideTab] = useState('threads');
  const [activeThread, setActiveThread] = useState('main');
  const [rightTab, setRightTab] = useState('thoughts');

  // Collect unique thread IDs from events for tab bar
  const threadIDs = ['main'];
  if (threads) threads.filter(t => t.id !== 'main').forEach(t => { if (!threadIDs.includes(t.id)) threadIDs.push(t.id); });

  return (
    <div className="h-screen flex flex-col">
      <StatusBar status={status} />

      {/* Graph */}
      <div className="border-b border-slate-700 bg-slate-900/50">
        <ThreadGraph threads={threads} status={status} activeThread={activeThread} onSelect={setActiveThread} />
      </div>

      {/* Bottom */}
      <div className="flex-1 flex overflow-hidden">
        {/* Left sidebar */}
        <div className="w-72 border-r border-slate-700 flex flex-col shrink-0">
          <div className="flex border-b border-slate-700">
            {['threads', 'console', 'directive'].map(t => (
              <button key={t} onClick={() => setSideTab(t)}
                className={`flex-1 py-2 text-xs font-medium ${sideTab === t ? 'text-indigo-400 border-b-2 border-indigo-400 bg-slate-800/50' : 'text-slate-500 hover:text-slate-300'}`}>
                {t}
              </button>
            ))}
          </div>
          <div className="flex-1 overflow-hidden">
            {sideTab === 'threads' && <ThreadList threads={threads} activeThread={activeThread} onSelect={setActiveThread} />}
            {sideTab === 'console' && <Console />}
            {sideTab === 'directive' && <DirectiveEditor />}
          </div>
        </div>

        {/* Right — thoughts + events */}
        <div className="flex-1 flex flex-col overflow-hidden">
          {/* Thread tabs + view toggle */}
          <div className="flex items-center border-b border-slate-700 px-2">
            <div className="flex-1 flex gap-1 overflow-x-auto py-1">
              {threadIDs.map(id => (
                <button key={id} onClick={() => setActiveThread(id)}
                  className={`px-3 py-1 text-xs rounded-t whitespace-nowrap ${id === activeThread ? 'bg-slate-700 text-indigo-400 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                  {id}
                </button>
              ))}
            </div>
            <div className="flex gap-1 ml-2">
              {['thoughts', 'events'].map(t => (
                <button key={t} onClick={() => setRightTab(t)}
                  className={`px-2 py-1 text-xs rounded ${rightTab === t ? 'bg-slate-700 text-slate-200' : 'text-slate-600 hover:text-slate-400'}`}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          {rightTab === 'thoughts'
            ? <ThoughtsPanel events={events} activeThread={activeThread} />
            : <EventLog events={events} />
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
